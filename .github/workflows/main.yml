name: Update Profile Stats

on:
  schedule:
    - cron: "0 3 * * *"
  push:
    paths:
      - ".github/workflows/update-stats.yml"
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create profile folder
        run: mkdir -p profile

      - name: Fetch GitHub Stats card (with retry + validation)
        run: |
          for i in 1 2 3 4 5; do
            curl -sSL "https://github-readme-stats.vercel.app/api?username=abubakarshahid439&show_icons=true&theme=tokyonight&hide_border=true" -o profile/stats_tmp.svg
            if grep -q "<svg" profile/stats_tmp.svg; then
              mv profile/stats_tmp.svg profile/stats.svg
              echo "stats.svg updated successfully"
              break
            else
              echo "Attempt $i failed, retrying in 15s..."
              rm -f profile/stats_tmp.svg
              sleep 15
            fi
          done

      - name: Fetch Top Languages card (with retry + validation)
        run: |
          for i in 1 2 3 4 5; do
            curl -sSL "https://github-readme-stats.vercel.app/api/top-langs/?username=abubakarshahid439&layout=compact&theme=tokyonight&hide_border=true" -o profile/top-langs_tmp.svg
            if grep -q "<svg" profile/top-langs_tmp.svg; then
              mv profile/top-langs_tmp.svg profile/top-langs.svg
              echo "top-langs.svg updated successfully"
              break
            else
              echo "Attempt $i failed, retrying in 15s..."
              rm -f profile/top-langs_tmp.svg
              sleep 15
            fi
          done

      - name: Generate Streak Stats card
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=abubakarshahid439&theme=tokyonight&hide_border=true
          path: profile/streak.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/stats.svg profile/top-langs.svg profile/streak.svg
          git commit -m "Update profile stats" || echo "No changes to commit"
          git push
